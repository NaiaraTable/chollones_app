<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Mapa de Chollos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" [scrollY]="false">
  <div id="map"></div>

  <!-- Panel de depuración opcional -->
  <div style="position: absolute; top: 70px; right: 10px; z-index: 9999;">
    <ion-button size="small" (click)="toggleDebug()">{{ showDebug ? 'Ocultar' : 'Mostrar' }} depuración</ion-button>
  </div>

  <div *ngIf="showDebug" style="position: absolute; top: 110px; right: 10px; z-index: 9998; max-height: 60vh; width: 320px; overflow: auto; background: rgba(255,255,255,0.95); padding: 8px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">
    <h4 style="margin:0 0 8px 0; font-size:14px;">Debug — chollos: {{ debugList.length }}</h4>
    <div *ngFor="let d of debugList" style="border-bottom:1px solid #eee; padding:6px 0; font-size:13px;">
      <div><b>{{ d.titulo }}</b></div>
      <div>Proveedor: {{ d.proveedor }}</div>
      <div>Lat: {{ d.lat }} — Lng: {{ d.lng }}</div>
      <div>Precio: {{ d.precio }}€</div>
      <ion-button fill="clear" size="small" (click)="irADetalle(d.id)">Ver</ion-button>
    </div>
  </div>

  <!-- Mensajes de estado visibles si la consola no está disponible -->
  <div style="position: absolute; bottom: 10px; left: 10px; z-index: 9999; background: rgba(0,0,0,0.7); color: #fff; padding: 8px; border-radius: 6px; max-height: 30vh; overflow:auto; width: 320px; font-size:12px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
      <strong>Estado</strong>
      <small style="opacity:0.8">{{ statusMessages.length }}</small>
    </div>
    <div *ngFor="let s of statusMessages" style="border-top:1px solid rgba(255,255,255,0.06); padding:4px 0;">{{ s }}</div>
  </div>
</ion-content>
