<ion-header class="main-header">
  <ion-toolbar color="primary">

    <div class="toolbar-content">
      <img src="assets/logo.PNG" class="header-logo" alt="Logo" [routerLink]="['/tabs/tab1']" />

      <!-- Buscador + sugerencias -->
      <div class="search-wrapper">
        <ion-searchbar
          class="top-search"
          placeholder="Buscar chollos o tiendas..."
          animated="true"
          [value]="textoBusqueda"
          (ionInput)="onBuscar($event)"
          (ionClear)="onLimpiarBusqueda()"
          (keyup.enter)="onEnter($event)"
          (ionBlur)="cerrarSugerencias()"
          debounce="250">
        </ion-searchbar>

        <!-- Dropdown de sugerencias -->
        <div class="sugerencias-dropdown" *ngIf="mostrarSugerencias">
          <div
            class="sugerencia-item"
            *ngFor="let s of sugerencias"
            (mousedown)="seleccionarSugerencia(s)">

            <img
              class="sug-img"
              [src]="s.imagen || 'assets/placeholder.png'"
              (error)="$any($event.target).src='assets/placeholder.png'" />

            <div class="sug-info">
              <span class="sug-titulo">{{ s.titulo }}</span>
              <span class="sug-proveedor">
                <ion-icon name="storefront-outline"></ion-icon>
                {{ s.proveedor }}
              </span>
            </div>

            <span class="sug-precio" *ngIf="s.precio">{{ s.precio }}€</span>
          </div>

          <!-- Ver todos -->
          <div class="sug-ver-todos" (mousedown)="buscarTexto(textoBusqueda)">
            <ion-icon name="search-outline"></ion-icon>
            Ver todos los resultados de "{{ textoBusqueda }}"
          </div>
        </div>
      </div>

      <ion-buttons slot="end" class="top-actions">
        <ion-button fill="clear" [routerLink]="['/tabs/tab3']">
          <ion-icon slot="icon-only" name="heart-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" [routerLink]="['/tabs/carrito']">
          <ion-icon slot="icon-only" name="bag-outline"></ion-icon>
        </ion-button>
      </ion-buttons>
    </div>

  </ion-toolbar>
</ion-header>

<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="tab1">
      <ion-icon name="flame-outline"></ion-icon>
      <ion-label>Inicio</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="tab2">
      <ion-icon name="grid-outline"></ion-icon>
      <ion-label>Categorías</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="mapa">
      <ion-icon name="location-outline"></ion-icon>
      <ion-label>Mapa</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="tab4">
      <ion-icon name="notifications-outline"></ion-icon>
      <ion-label>Chollos</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="tab5">
      <ion-icon name="person-outline"></ion-icon>
      <ion-label>Perfil</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>

<div class="contenedor-mascota" style="z-index: 999999; pointer-events: none;">
  <img src="assets/chololo.png" class="monito-animado" alt="Mascota Chollones" width="120" height="120" (click)="abrirJuegos()"
    style="cursor: pointer; pointer-events: auto; position: relative; z-index: 999999;">
</div>

<ion-modal id="modal-juegos" [isOpen]="modalJuegosAbierto" (didDismiss)="cerrarJuegos()">
  <ng-template>
    <ion-content class="ion-no-padding" [scrollY]="false">
      <ion-fab vertical="top" horizontal="end" slot="fixed" style="margin: 10px; z-index: 99999;">
        <ion-fab-button size="small" color="light" (click)="cerrarJuegos()">
          <ion-icon name="close"></ion-icon>
        </ion-fab-button>
      </ion-fab>
      <app-game-base></app-game-base>
    </ion-content>
  </ng-template>
</ion-modal>
