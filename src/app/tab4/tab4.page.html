<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-searchbar
      placeholder="Buscar chollos o tiendas..."
      #searchbar
      (ionInput)="buscar($event)"
      debounce="300">
    </ion-searchbar>

    <ion-buttons slot="end">
      <ion-button>
        <ion-icon slot="icon-only" name="heart-outline"></ion-icon>
      </ion-button>
      <ion-button>
        <ion-icon slot="icon-only" name="bag-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <div class="filters-bar">
    <div class="scroll-container">
      <button
        type="button"
        class="filter-chip"
        *ngFor="let cat of categorias"
        [class.active]="categoriaSeleccionada === cat.slug"
        (click)="seleccionarCategoria(cat.slug)"
      >
        {{ cat.nombre }}
      </button>
    </div>
  </div>
</ion-header>

<ion-content>
  <div class="chollos-container">

    <div *ngIf="cargando" class="loading">
      <ion-spinner name="crescent" color="primary"></ion-spinner>
    </div>

    <div *ngIf="!cargando" class="guardados-list">
      <div class="chollo-card" *ngFor="let chollo of chollosPaginados">

        <div class="image-container" (click)="irADetalle(chollo.id)">
          <div class="badge" *ngIf="calcDescuento(chollo) > 0">
            -{{ calcDescuento(chollo) }}%
          </div>

          <img
            class="cover"
            *ngIf="chollo.imagen_url"
            [src]="chollo.imagen_url"
            (error)="chollo.imagen_url = null"
          />

          <div class="no-image" *ngIf="!chollo.imagen_url">
            <ion-icon name="image-outline"></ion-icon>
            <span>NO IMAGEN</span>
          </div>
        </div>

        <div class="meta" (click)="irADetalle(chollo.id)">

          <div class="header-meta">
            <div class="provider-row">
              <span class="provider">{{ chollo.proveedores?.nombre || 'Proveedor' }}</span>
              <span class="dist" *ngIf="chollo.distanciaKM && chollo.distanciaKM !== '?'">
                <ion-icon name="location-outline"></ion-icon>
                {{ chollo.distanciaKM }} km
              </span>
            </div>

            <div class="fav-icon" (click)="toggleFavorito(chollo, $event)">
              <ion-icon [name]="esFavorito(chollo.id) ? 'heart' : 'heart-outline'"></ion-icon>
            </div>
          </div>

          <div class="title">{{ chollo.titulo }}</div>

          <div class="bottom-meta">
            <div class="prices">
              <span class="now">{{ chollo.precio_actual | number:'1.2-2' }}€</span>
              <span class="old" *ngIf="chollo.precio_original">{{ chollo.precio_original | number:'1.2-2' }}€</span>
            </div>

            <button class="btn-cart red-btn" (click)="anadirAlCarrito(chollo, $event)">
              <ion-icon name="cart-outline"></ion-icon>
            </button>
          </div>
        </div>

      </div>
    </div>

    <ion-infinite-scroll *ngIf="!cargando" [disabled]="infiniteScrollDisabled" (ionInfinite)="cargarMas($event)">
      <ion-infinite-scroll-content
        loadingSpinner="crescent"
        loadingText="Cargando más chollos...">
      </ion-infinite-scroll-content>
    </ion-infinite-scroll>

  </div>
</ion-content>
