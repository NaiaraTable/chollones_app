<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-searchbar placeholder="Buscar chollos..." (ionInput)="buscar($event)"></ion-searchbar>
    <ion-buttons slot="end">
      <ion-button><ion-icon slot="icon-only" name="heart-outline"></ion-icon></ion-button>
      <ion-button><ion-icon slot="icon-only" name="bag-outline"></ion-icon></ion-button>
    </ion-buttons>
  </ion-toolbar>

  <div class="filters-bar">
    <div class="scroll-container">
      <button type="button" class="filter-chip"
              *ngFor="let cat of categorias"
              [class.active]="categoriaSeleccionada === cat.slug"
              (click)="seleccionarCategoria(cat.slug)">
        {{ cat.nombre }}
      </button>
    </div>
  </div>
</ion-header>

<ion-content>
  <div *ngIf="cargando" class="ion-padding ion-text-center">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
    <p>Cargando chollos...</p>
  </div>

  <div class="chollos-container" *ngIf="!cargando">
    <div class="chollo-card" *ngFor="let chollo of filtrados" (click)="irADetalle(chollo.id)">

      <div class="image-wrapper">
        <img [src]="chollo.imagen_url || 'assets/placeholder.png'" alt="producto" />
        <div class="discount-tag" *ngIf="calcDescuento(chollo) > 0">-{{ calcDescuento(chollo) }}%</div>
        <button class="fav-circle" [class.is-fav]="esFavorito(chollo.id)"
                (click)="toggleFavorito(chollo, $event); $event.stopPropagation()">
          <ion-icon [name]="esFavorito(chollo.id) ? 'heart' : 'heart-outline'"></ion-icon>
        </button>
      </div>

      <div class="card-content">
        <div class="top-meta">
          <span class="vendor">{{ chollo.proveedores?.nombre || 'Tienda' }}</span>
          <span class="dot" *ngIf="chollo.distanciaKM !== '?'"></span>
          <span class="dist" *ngIf="chollo.distanciaKM !== '?'">{{ chollo.distanciaKM }} km</span>
        </div>

        <h2 class="title">{{ chollo.titulo }}</h2>
        <p class="description">{{ chollo.descripcionCorta }}</p>

        <div class="card-footer">
          <div class="price-box">
            <span class="main-price">{{ chollo.precio_actual }}€</span>
            <span class="old-price" *ngIf="chollo.precio_original > chollo.precio_actual">
              {{ chollo.precio_original }}€
            </span>
          </div>

          <button class="add-to-cart-btn" (click)="anadirAlCarrito(chollo, $event)">
            <ion-icon name="cart-outline"></ion-icon>
            <span>Añadir al carrito</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</ion-content>
