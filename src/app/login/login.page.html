<ion-content>
  <!-- Background decorativo moderno -->
  <div class="decor-bg decor-1"></div>
  <div class="decor-bg decor-2"></div>

  <div class="auth-container">
    <div class="auth-header">
      <div class="logo-box">
        <ion-icon name="bag-outline"></ion-icon>
      </div>
      <h1>¡Hola de nuevo!</h1>
      <p>Entra para descubrir los mejores chollos.</p>
    </div>

    <div class="auth-card">
      <ion-item lines="none" class="modern-input">
        <ion-icon name="mail-outline" slot="start" color="medium"></ion-icon>
        <ion-label position="stacked">Email</ion-label>
        <ion-input type="email" [(ngModel)]="email" placeholder="tu@email.com"></ion-input>
      </ion-item>

      <ion-item lines="none" class="modern-input">
        <ion-icon name="lock-closed-outline" slot="start" color="medium"></ion-icon>
        <ion-label position="stacked">Contraseña</ion-label>
        <ion-input type="password" [(ngModel)]="password" placeholder="••••••••"></ion-input>
      </ion-item>

      <ion-button expand="block" (click)="handleLogin()" class="btn-auth btn-primary">
        INICIAR SESIÓN
      </ion-button>
    </div>

    <div class="auth-footer">
      <p>¿No tienes cuenta?</p>
      <ion-button fill="clear" routerLink="/tabs/registro" class="btn-link">
        CREA UNA AQUÍ
      </ion-button>
    </div>
  </div>
</ion-content>
