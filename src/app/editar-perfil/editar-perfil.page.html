<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab5" text="" color="danger"></ion-back-button>
    </ion-buttons>
    <ion-title>Editar Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>

  <!-- Avatar -->
  <div class="avatar-section">
    <div class="avatar-wrapper" (click)="fileInput.click()">
      <ion-avatar>
        <img [src]="avatarUrl || 'https://ionicframework.com/docs/img/demos/avatar.svg'" />
      </ion-avatar>
      <div class="camera-overlay">
        <ion-icon name="camera-outline"></ion-icon>
      </div>
    </div>
    <input #fileInput type="file" accept="image/*" hidden (change)="onAvatarSelected($event)" />
    <p class="avatar-hint">Toca para cambiar la foto</p>
  </div>

  <!-- Datos personales -->
  <div class="form-section">
    <div class="section-label">Datos personales</div>

    <ion-list lines="full" class="form-list">

      <!-- Nombre -->
      <ion-item>
        <ion-icon slot="start" name="person-outline"></ion-icon>
        <ion-input
          label="Nombre completo"
          labelPlacement="floating"
          [(ngModel)]="fullName"
          placeholder="Tu nombre">
        </ion-input>
      </ion-item>

      <!-- Teléfono: solo números -->
      <ion-item>
        <ion-icon slot="start" name="call-outline"></ion-icon>
        <ion-input
          label="Teléfono"
          labelPlacement="floating"
          type="tel"
          inputmode="numeric"
          [(ngModel)]="phone"
          (ionInput)="onPhoneInput($event)"
          placeholder="+34 600 000 000">
        </ion-input>
      </ion-item>

      <!-- Fecha de nacimiento — input nativo HTML -->
      <ion-item class="fecha-item">
        <ion-icon slot="start" name="calendar-outline"></ion-icon>
        <div class="fecha-inner">
          <label class="fecha-label">Fecha de Nacimiento</label>
          <input
            type="date"
            class="fecha-input"
            [(ngModel)]="birthDate"
            [max]="today"
            min="1920-01-01" />
        </div>
      </ion-item>

      <!-- Dirección -->
      <ion-item>
        <ion-icon slot="start" name="location-outline"></ion-icon>
        <ion-input
          label="Dirección"
          labelPlacement="floating"
          [(ngModel)]="address"
          placeholder="Calle, ciudad, CP">
        </ion-input>
      </ion-item>

    </ion-list>
  </div>

  <div class="btn-section">
    <ion-button expand="block" class="btn-save" (click)="guardarPerfil()" [disabled]="saving">
      <ion-spinner *ngIf="saving" name="crescent" slot="start"></ion-spinner>
      {{ saving ? 'Guardando...' : 'Guardar cambios' }}
    </ion-button>
  </div>

  <div class="spacer"></div>
</ion-content>
